<!DOCTYPE html>

<html>

<head>

<title>My Futur Cars </title>

<style>

body {

font-family: Arial;

background: #f18282;

padding: 30px;

text-align: center;

}

h1 { color: #ffef09; }

p { color: #d0ff00; }

.cards {

display: flex;

justify-content: center;

gap: 20px;

margin-top: 25px;

}

.card {

background: white;

border: 3px solid #eb3c9c;

border-radius: 12px;

padding: 20px;

width: 200px;

}

.cars-name {

font-size: 22px;

font-weight: bold;

color: #333;

}

.cars-fact { color: #666; margin-top: 10px; font-size: 14px; }

button {

background: #ff5a43;

color: white;

border: none;

padding: 12px 28px;

border-radius: 8px;

cursor: pointer;

font-size: 16px;

margin-top: 10px;

}

</style>

</head>

<body>

<h1>My Future Cars </h1>

<p>Use a JavaScript class to build future card!</p>

<button onclick="showCars()">Show Cars!</button>

<div class="cards">

<div id="card1"></div>

<div id="card2"></div>

<div id="card3"></div>

</div>

<script>

class Cars {

constructor(name, fact) {

this.name = name;

this.fact = fact;

}

describe() {

return this.name + ": " + this.fact;

}

}

function showCars() {

let p1 = new Cars("BMW M4", "The beautiful eyes ever shine");

let p2 = new Cars("Rolls Royal", "The feeling of rich");

let p3 = new Cars("G-Wagon", "The king of offroads");

document.getElementById("card1").innerHTML =

"<div class='card'><div class='cars-name'>" + p1.name + "</div>" +

"<div class='cars-fact'>" + p1.describe() + "</div></div>";

document.getElementById("card2").innerHTML =

"<div class='card'><div class='cars-name'>" + p2.name + "</div>" +

"<div class='cars-fact'>" + p2.describe() + "</div></div>";

document.getElementById("card3").innerHTML =

"<div class='card'><div class='cars-name'>" + p3.name + "</div>" +

"<div class='cars-fact'>" + p3.describe() + "</div></div>";


}

</script>

</body>

</html>
