<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>


div.absolute{
    position: absolute;
    background-color: crimson; width: 200px; left: 50px;
    left: 50px;
    border: 3px solid black;

}

div.relative{
    position: relative;
    background-color: brown; width: 200px; left: 20px;
    left: 100px;
    border: 4px solid blue;

}

div.fixed{
    position: fixed;
    background-color: blueviolet; width: 200px; margin-left: 20px;
    top: 0;
    right: 50px;
    width: 300px;
    border: 3px solid green;

}

div.sticky{
    position: sticky;
    background-color: aqua; width: 200px;
    top: 1px;
    right: 100px;
    width: 300px;
    border: 3px solid red;
}


</style>
<body>

    <h2>hi i am prince</h2>

    <div> 
        this is my project
    </div><br><br><br><br>

    <div class="absolute">
        this is my second project
    </div><br><br><br><br>

    <div class="relative">
    this is third project
    </div> <br><br><br><br>

    <div class="fixed">
     this is fourth project
    </div>
    <br><br><br>
    <div class="sticky">
        this is fifth project
    </div>

<br><br><br><br><br><br><br><br><br><br><br><br><br><br>
<br><br><br><br><br><br><br><br><br><br><br><br><br><br>

<br><br><br><br><br><br><br><br><br><br><br><br><br><br>
<br><br><br><br><br><br><br><br><br><br><br><br><br><br>
<br><br><br><br><br><br><br><br><br><br><br><br><br><br>

</body>
</html>
